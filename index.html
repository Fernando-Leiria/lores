<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fórum de Lores | Mysrissia</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cGF0aCBmaWxsPSIjOEIxQzJBIiBzdHJva2U9IiNiNTdhYzgiIHN0cm9rZS13aWR0aD0iMS41IiBkPSJNNTAgMTAgTDY4IDMwIEw2MiA1NSBMNTAgNzAgTDM4IDU1IEwzMiAzMCB6Ii8+PGNpcmNsZSBjeD0iNTAiIGN5PSI0NSIgcj0iOCIgZmlsbD0iI2E1M2Y2ZSIgc3Ryb2tlPSIjZTViODdhIiBzdHJva2Utd2lkdGg9IjEiLz48L3N2Zz4=">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="stars-bg"></div>
<div class="vignette"></div>

<div class="banner-wrapper">
    <img class="banner" src="https://media.giphy.com/media/3orieS4jfHJaKwkeli/giphy.gif" alt="Banner" onerror="this.src='https://placehold.co/1200x260?text=Banner'">
</div>

<div class="container">
    <div class="hero">
        <div class="sigil"></div>
        <h1>📜 Arquivos de Mysrissia</h1>
        <div class="sub">Fórum pessoal — Postagens, capítulos e visualizações</div>
    </div>

    <!-- Botões principais -->
    <div class="action-bar">
        <button id="newPostBtn" class="btn-action"><i class="fas fa-plus-circle"></i> Nova Postagem</button>
        <button id="exportAllBtn" class="btn-action"><i class="fas fa-download"></i> Exportar Tudo</button>
        <input type="file" id="importInput" accept=".json" style="display:none">
        <button id="importAllBtn" class="btn-action"><i class="fas fa-upload"></i> Importar Backup</button>
    </div>

    <!-- VIEW: LISTA DE POSTAGENS -->
    <div id="postsView">
        <div class="stats-bar">
            <span><i class="fas fa-layer-group"></i> Postagens: <span id="totalPosts">0</span></span>
            <span><i class="fas fa-eye"></i> Total de visualizações: <span id="totalViews">0</span></span>
        </div>
        <div id="postsGrid" class="posts-grid"></div>
    </div>

    <!-- VIEW: DETALHE DA POSTAGEM (capítulos) -->
    <div id="postDetailView" style="display: none;">
        <button id="backToPostsBtn" class="btn-action" style="margin-bottom:1rem;"><i class="fas fa-arrow-left"></i> Voltar ao Fórum</button>
        <div id="postDetailHeader"></div>
        <div class="action-bar" style="margin-top:0.5rem;">
            <button id="addChapterBtn" class="btn-action"><i class="fas fa-feather-alt"></i> Novo Capítulo</button>
            <button id="editPostBtn" class="btn-action"><i class="fas fa-edit"></i> Editar Postagem</button>
            <button id="deletePostBtn" class="btn-action" style="background:#8b3a5a;"><i class="fas fa-trash-alt"></i> Excluir Postagem</button>
        </div>
        <div id="chaptersContainer" class="chapters-list"></div>
    </div>
</div>

<!-- MODAL para criação/edição de POSTAGEM -->
<div id="postModal" class="modal-overlay">
    <div class="modal">
        <h3 id="postModalTitle">✧ Nova Postagem ✧</h3>
        <label>Título</label>
        <input type="text" id="postTitle" placeholder="Ex: Crônicas de Sophia Ker">
        <label>Imagem (arraste ou clique)</label>
        <div id="postUploadArea" class="upload-area">
            <p><i class="fas fa-cloud-upload-alt"></i> Arraste PNG/JPG ou clique</p>
            <input type="file" id="postFileInput" accept="image/png,image/jpeg" style="display:none">
            <div id="postPreviewContainer" style="display:none">
                <img id="postPreviewImg" class="image-preview" alt="Preview">
                <button type="button" id="clearPostImgBtn" class="btn-clear-img">Remover</button>
            </div>
        </div>
        <label>Ou URL da imagem</label>
        <input type="text" id="postImageUrl" placeholder="https://...">
        <label>Descrição curta</label>
        <textarea id="postDesc" rows="2"></textarea>
        <div class="modal-buttons">
            <button class="btn-cancel modalClose">Cancelar</button>
            <button id="savePostBtn" class="btn-save">Salvar Postagem</button>
        </div>
    </div>
</div>

<!-- MODAL para criação/edição de CAPÍTULO (reaproveita o mesmo do sistema anterior) -->
<div id="chapterModal" class="modal-overlay">
    <div class="modal">
        <h3 id="chapterModalTitle">✧ Capítulo ✧</h3>
        <label>Título do Capítulo</label>
        <input type="text" id="chapterTitle" placeholder="Título">
        <label>Tags (separadas por vírgula)</label>
        <input type="text" id="chapterTags" placeholder="ex: magia, guerra">
        <label>Imagem (arraste ou URL)</label>
        <div id="chapterUploadArea" class="upload-area">
            <p><i class="fas fa-cloud-upload-alt"></i> Arraste ou clique</p>
            <input type="file" id="chapterFileInput" accept="image/png,image/jpeg" style="display:none">
            <div id="chapterPreviewContainer" style="display:none">
                <img id="chapterPreviewImg" class="image-preview" alt="Preview">
                <button type="button" id="clearChapterImgBtn" class="btn-clear-img">Remover</button>
            </div>
        </div>
        <label>URL alternativa</label>
        <input type="text" id="chapterImageUrl" placeholder="https://...">
        <label>Resumo breve</label>
        <textarea id="chapterSummary" rows="2"></textarea>
        <label>Conteúdo completo</label>
        <div class="toolbar">
            <button type="button" id="chBold"><b>N</b></button>
            <button type="button" id="chItalic"><i>I</i></button>
            <button type="button" id="chUnderline"><u>S</u></button>
            <button type="button" id="chH3">H3</button>
            <button type="button" id="chP">P</button>
            <button type="button" id="chClear">Limpar</button>
            <button type="button" id="chMarkdown">MD</button>
        </div>
        <div id="chapterEditor" class="rich-editor" contenteditable="true"></div>
        <div class="modal-buttons">
            <button class="btn-cancel modalClose">Cancelar</button>
            <button id="saveChapterBtn" class="btn-save">Salvar</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
