<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fórum de Lores | Mysrissia</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cGF0aCBmaWxsPSIjOEIxQzJBIiBzdHJva2U9IiNiNTdhYzgiIHN0cm9rZS13aWR0aD0iMS41IiBkPSJNNTAgMTAgTDY4IDMwIEw2MiA1NSBMNTAgNzAgTDM4IDU1IEwzMiAzMCB6Ii8+PGNpcmNsZSBjeD0iNTAiIGN5PSI0NSIgcj0iOCIgZmlsbD0iI2E1M2Y2ZSIgc3Ryb2tlPSIjZTViODdhIiBzdHJva2Utd2lkdGg9IjEiLz48L3N2Zz4=">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0e0714 0%, #1c0e1a 100%);
            color: #f3e9e0;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            line-height: 1.65;
            overflow-x: hidden;
        }
        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(ellipse at 30% 40%, #2a0f1c, #0a0310);
        }
        .stars-bg::before, .stars-bg::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(2px 2px at 15px 35px, #e8b4c8, transparent),
                              radial-gradient(1px 1px at 80px 150px, #b87ad0, transparent);
            background-repeat: no-repeat;
            background-size: 200px 200px, 150px 150px;
            opacity: 0.5;
            animation: starTwinkle 10s infinite alternate;
        }
        @keyframes starTwinkle {
            0% { opacity: 0.2; }
            100% { opacity: 0.8; }
        }
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 180px rgba(0,0,0,0.6);
            pointer-events: none;
            z-index: 1;
        }
        .container { position: relative; z-index: 2; max-width: 1300px; margin: 0 auto; padding: 0 2rem 3rem; }
        .banner-wrapper { width: 100vw; position: relative; left: 50%; right: 50%; margin-left: -50vw; margin-right: -50vw; background: #0a0310; }
        .banner { width: 100%; max-height: 220px; object-fit: cover; border-bottom: 2px solid #a14268; }
        .hero { text-align: center; padding: 2rem 1rem; border-bottom: 2px solid rgba(128,30,58,0.5); margin-bottom: 1rem; }
        .hero h1 { font-family: 'Cinzel', serif; font-size: 2.8rem; background: linear-gradient(135deg,#f4cfdf,#c28bc9,#a03e6b); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .sigil { margin: 0.5rem auto; width: 60px; height: 60px; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path fill="%238B1C2A" stroke="%23b57ac8" d="M50 10 L68 30 L62 55 L50 70 L38 55 L32 30 z"/><circle cx="50" cy="45" r="8" fill="%23a53f6e"/></svg>') no-repeat center; background-size: contain; }
        .top-bar { display: flex; justify-content: flex-end; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .user-info { background: #190e17a0; padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.9rem; display: flex; align-items: center; gap: 0.8rem; }
        .btn-action, .btn-filter {
            background: linear-gradient(145deg, #7a264a, #4a1a35);
            border: 1px solid #bf7f9f;
            color: #fae9f0;
            padding: 0.5rem 1.2rem;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-action:hover { background: linear-gradient(145deg, #9f3f62, #5e2340); box-shadow: 0 0 8px #e07a9e; }
        .stats-bar { background: #190e17a0; border-radius: 60px; padding: 0.4rem 1.2rem; margin-bottom: 1.5rem; display: flex; justify-content: space-between; flex-wrap: wrap; }
        .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.8rem; }
        .post-card { background: rgba(18, 8, 14, 0.8); backdrop-filter: blur(5px); border: 1px solid #a14268; border-radius: 36px; padding: 1.2rem; transition: 0.2s; }
        .post-card:hover { border-color: #e07a9e; transform: translateY(-3px); }
        .post-img { width: 100%; height: 160px; object-fit: cover; border-radius: 24px; margin-bottom: 1rem; border: 1px solid #c0678b; }
        .post-title { font-family: 'Cinzel', serif; font-size: 1.5rem; color: #fad5e4; }
        .post-desc { color: #e7cad9; font-style: italic; margin: 0.5rem 0; }
        .post-meta { display: flex; justify-content: space-between; margin-top: 0.8rem; font-size: 0.8rem; color: #cc9bb0; }
        .post-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; }
        .post-actions button { background: #2c1422; border: none; color: #e7c2d4; padding: 0.2rem 0.8rem; border-radius: 30px; cursor: pointer; }
        .chapter-card { background: rgba(18,8,14,0.7); border: 1px solid #a14268; border-radius: 32px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .chapter-header { display: flex; justify-content: space-between; flex-wrap: wrap; border-bottom: 1px dashed #a14268; }
        .chapter-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 0.5rem 0; }
        .tag { background: #472a3a; padding: 0.1rem 0.7rem; border-radius: 20px; font-size: 0.7rem; }
        .chapter-preview { display: flex; gap: 1.5rem; flex-wrap: wrap; margin: 1rem 0; }
        .chapter-img { width: 140px; height: 140px; object-fit: cover; border-radius: 24px; border: 2px solid #c0678b; }
        .chapter-summary { flex: 1; font-style: italic; }
        .chapter-full-content { display: none; margin-top: 1rem; border-top: 1px solid #a14268; padding-top: 1rem; }
        .btn-expand { background: none; border: 1px solid #c0678b; border-radius: 30px; padding: 0.2rem 1rem; cursor: pointer; margin-top: 0.5rem; }
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            z-index: 100; display: flex; align-items: center; justify-content: center;
            visibility: hidden; opacity: 0; transition: 0.2s;
        }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal {
            background: #170d16; border: 1px solid #bb6d8f; border-radius: 48px;
            width: 90%; max-width: 550px; max-height: 85vh; overflow-y: auto;
            padding: 1.8rem;
        }
        .modal h3 { font-family: 'Cinzel', serif; color: #f3cfdf; margin-bottom: 1rem; }
        .modal input, .modal textarea {
            width: 100%; background: #231a24; border: 1px solid #a14268;
            border-radius: 28px; padding: 0.6rem 1rem; color: #f5e6ed;
            font-family: 'Cormorant Garamond', serif; margin-bottom: 0.8rem;
        }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1rem; }
        .btn-save { background: #8b3a5a; color: white; }
        .btn-cancel { background: #3a202e; color: #eac2d4; }
        .empty-message { text-align: center; padding: 3rem; color: #cfa7bb; border: 1px dashed #a54e74; border-radius: 40px; }
        .admin-only { display: none; }
        @media (max-width: 700px) { .chapter-img { width: 100px; height: 100px; } .posts-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="stars-bg"></div>
<div class="vignette"></div>

<div class="banner-wrapper">
    <img class="banner" src="https://media.giphy.com/media/3orieS4jfHJaKwkeli/giphy.gif" alt="Banner" onerror="this.src='https://placehold.co/1200x260?text=Banner'">
</div>

<div class="container">
    <div class="hero">
        <div class="sigil"></div>
        <h1>📜 Arquivos de Mysrissia</h1>
        <div class="sub">Fórum de Lores — Criado e administrado por você</div>
    </div>

    <div class="top-bar">
        <div class="user-info" id="userStatus">
            <i class="fas fa-spinner fa-pulse"></i> Carregando...
        </div>
    </div>

    <div class="action-bar" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 1rem; margin-bottom: 1.5rem;">
        <button id="newPostBtn" class="btn-action admin-only"><i class="fas fa-plus-circle"></i> Nova Postagem</button>
        <button id="exportAllBtn" class="btn-action admin-only"><i class="fas fa-download"></i> Exportar Dados</button>
        <input type="file" id="importInput" accept=".json" style="display:none">
        <button id="importAllBtn" class="btn-action admin-only"><i class="fas fa-upload"></i> Importar Backup</button>
    </div>

    <div id="postsView">
        <div class="stats-bar">
            <span><i class="fas fa-layer-group"></i> Postagens: <span id="totalPosts">0</span></span>
            <span><i class="fas fa-eye"></i> Total visualizações: <span id="totalViews">0</span></span>
        </div>
        <div id="postsGrid" class="posts-grid"></div>
    </div>

    <div id="postDetailView" style="display: none;">
        <button id="backToPostsBtn" class="btn-action" style="margin-bottom:1rem;"><i class="fas fa-arrow-left"></i> Voltar ao Fórum</button>
        <div id="postDetailHeader"></div>
        <div class="action-bar" style="margin-top:0.5rem;">
            <button id="addChapterBtn" class="btn-action admin-only"><i class="fas fa-feather-alt"></i> Novo Capítulo</button>
            <button id="editPostBtn" class="btn-action admin-only"><i class="fas fa-edit"></i> Editar Postagem</button>
            <button id="deletePostBtn" class="btn-action admin-only" style="background:#8b3a5a;"><i class="fas fa-trash-alt"></i> Excluir Postagem</button>
        </div>
        <div id="chaptersContainer" class="chapters-list"></div>
    </div>
</div>

<!-- MODAL DE LOGIN/CADASTRO -->
<div id="authModal" class="modal-overlay">
    <div class="modal">
        <h3 id="authModalTitle">🔐 Acesso ao Fórum</h3>
        <div id="loginForm">
            <input type="text" id="loginUser" placeholder="Usuário ou Email">
            <input type="password" id="loginPass" placeholder="Senha">
            <button id="doLogin" class="btn-save" style="width:100%">Entrar</button>
            <p style="text-align:center; margin-top:0.8rem;">Ainda não tem conta? <a href="#" id="showRegisterLink">Cadastre-se</a></p>
        </div>
        <div id="registerForm" style="display:none;">
            <input type="text" id="regUser" placeholder="Nome de usuário">
            <input type="email" id="regEmail" placeholder="Email">
            <input type="password" id="regPass" placeholder="Senha (8+ chars, 1 maiúscula, 1 minúscula, 1 número)">
            <button id="doRegister" class="btn-save" style="width:100%">Cadastrar</button>
            <p style="text-align:center; margin-top:0.8rem;"><a href="#" id="showLoginLink">Voltar ao login</a></p>
        </div>
        <div class="modal-buttons">
            <button class="btn-cancel modalClose">Fechar</button>
        </div>
    </div>
</div>

<!-- MODAL PARA POSTAGEM (criar/editar) -->
<div id="postModal" class="modal-overlay">
    <div class="modal">
        <h3 id="postModalTitle">✧ Nova Postagem ✧</h3>
        <input type="text" id="postTitle" placeholder="Título">
        <input type="text" id="postImageUrl" placeholder="URL da imagem (opcional)">
        <textarea id="postDesc" rows="2" placeholder="Descrição curta"></textarea>
        <div class="modal-buttons">
            <button class="btn-cancel modalClose">Cancelar</button>
            <button id="savePostBtn" class="btn-save">Salvar</button>
        </div>
    </div>
</div>

<!-- MODAL PARA CAPÍTULO (criar/editar) -->
<div id="chapterModal" class="modal-overlay">
    <div class="modal">
        <h3 id="chapterModalTitle">✧ Capítulo ✧</h3>
        <input type="text" id="chapterTitle" placeholder="Título do capítulo">
        <input type="text" id="chapterTags" placeholder="Tags separadas por vírgula">
        <input type="text" id="chapterImageUrl" placeholder="URL da imagem (opcional)">
        <textarea id="chapterSummary" rows="2" placeholder="Resumo breve"></textarea>
        <textarea id="chapterContent" rows="5" placeholder="Conteúdo completo (pode usar **negrito**, *itálico*)"></textarea>
        <div class="modal-buttons">
            <button class="btn-cancel modalClose">Cancelar</button>
            <button id="saveChapterBtn" class="btn-save">Salvar</button>
        </div>
    </div>
</div>

<script>
    // ==================== GLOBAL ====================
    let currentUser = { logged_in: false, is_admin: false, username: null };
    let posts = [];
    let currentPostId = null;
    let editingPostId = null;
    let editingChapterId = null;

    // ==================== AUTENTICAÇÃO ====================
    async function checkAuth() {
        const res = await fetch('check_auth.php');
        currentUser = await res.json();
        updateUIByAuth();
        if (currentUser.logged_in) {
            loadPosts();
        } else {
            renderPostsView();
        }
    }

    function updateUIByAuth() {
        const statusDiv = document.getElementById('userStatus');
        if (currentUser.logged_in) {
            statusDiv.innerHTML = `<i class="fas fa-user-circle"></i> ${currentUser.username} 
                <button id="logoutBtn" class="btn-action" style="padding:0.2rem 0.8rem;">Sair</button>`;
            document.getElementById('logoutBtn')?.addEventListener('click', logout);
        } else {
            statusDiv.innerHTML = `<button id="showAuthBtn" class="btn-action">Entrar / Cadastrar</button>`;
            document.getElementById('showAuthBtn')?.addEventListener('click', showAuthModal);
        }
        // Mostrar/ocultar botões de admin
        const adminBtns = document.querySelectorAll('.admin-only');
        adminBtns.forEach(btn => {
            btn.style.display = currentUser.is_admin ? 'inline-flex' : 'none';
        });
    }

    async function logout() {
        await fetch('logout.php');
        location.reload();
    }

    function showAuthModal() {
        const modal = document.getElementById('authModal');
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        modal.classList.add('active');
    }

    // Eventos de login/registro
    document.getElementById('doLogin')?.addEventListener('click', async () => {
        const login = document.getElementById('loginUser').value;
        const pass = document.getElementById('loginPass').value;
        const res = await fetch('login.php', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({login, password: pass})
        });
        const data = await res.json();
        if (res.ok) {
            location.reload();
        } else {
            alert(data.error || 'Erro ao fazer login');
        }
    });

    document.getElementById('doRegister')?.addEventListener('click', async () => {
        const username = document.getElementById('regUser').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPass').value;
        const res = await fetch('register.php', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, email, password})
        });
        const data = await res.json();
        if (res.ok) {
            alert('Conta criada com sucesso! Agora faça login.');
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
        } else {
            alert(data.error || 'Erro no cadastro');
        }
    });

    document.getElementById('showRegisterLink')?.addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
    });
    document.getElementById('showLoginLink')?.addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
    });

    // Fechar modais
    document.querySelectorAll('.modalClose').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
        });
    });

    // ==================== POSTAGENS ====================
    async function loadPosts() {
        const res = await fetch('api_posts.php');
        posts = await res.json();
        renderPostsView();
    }

    async function createPost(title, image_url, description) {
        const res = await fetch('api_posts.php', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({title, image_url, description})
        });
        if (res.ok) loadPosts();
        else alert('Erro ao criar postagem');
    }

    async function updatePost(id, title, image_url, description) {
        const res = await fetch('api_posts.php', {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id, title, image_url, description})
        });
        if (res.ok) loadPosts();
        else alert('Erro ao atualizar');
    }

    async function deletePost(id) {
        if (!confirm('Excluir esta postagem e todos os capítulos?')) return;
        const res = await fetch('api_posts.php', {
            method: 'DELETE',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id})
        });
        if (res.ok) {
            if (currentPostId === id) document.getElementById('backToPostsBtn').click();
            loadPosts();
        } else alert('Erro ao excluir');
    }

    async function incrementViews(postId) {
        await fetch('api_posts.php', {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id: postId, action: 'increment_view'})
        });
    }

    function renderPostsView() {
        document.getElementById('postsView').style.display = 'block';
        document.getElementById('postDetailView').style.display = 'none';
        const grid = document.getElementById('postsGrid');
        const totalPostsSpan = document.getElementById('totalPosts');
        const totalViewsSpan = document.getElementById('totalViews');
        totalPostsSpan.innerText = posts.length;
        const totalViews = posts.reduce((acc, p) => acc + (p.views || 0), 0);
        totalViewsSpan.innerText = totalViews;

        if (!posts.length) {
            grid.innerHTML = '<div class="empty-message">Nenhuma postagem ainda.</div>';
            return;
        }
        grid.innerHTML = '';
        posts.forEach(post => {
            const card = document.createElement('div');
            card.className = 'post-card';
            card.innerHTML = `
                <img class="post-img" src="${post.image_url || 'https://placehold.co/300x160?text=Sem+Imagem'}" onerror="this.src='https://placehold.co/300x160'">
                <h3 class="post-title">${escapeHtml(post.title)}</h3>
                <div class="post-desc">${escapeHtml(post.description?.substring(0,100) || '')}${post.description?.length > 100 ? '…' : ''}</div>
                <div class="post-meta"><span><i class="fas fa-eye"></i> ${post.views || 0} views</span><span><i class="fas fa-book"></i> Capítulos</span></div>
                <div class="post-actions">
                    <button class="viewPostBtn" data-id="${post.id}"><i class="fas fa-folder-open"></i> Abrir</button>
                    ${currentUser.is_admin ? `<button class="editPostBtn" data-id="${post.id}"><i class="fas fa-edit"></i> Editar</button>
                    <button class="deletePostBtn" data-id="${post.id}"><i class="fas fa-trash-alt"></i> Excluir</button>` : ''}
                </div>
            `;
            grid.appendChild(card);
        });
        document.querySelectorAll('.viewPostBtn').forEach(btn => btn.addEventListener('click', () => openPostDetail(parseInt(btn.dataset.id))));
        if (currentUser.is_admin) {
            document.querySelectorAll('.editPostBtn').forEach(btn => btn.addEventListener('click', () => openPostModal(parseInt(btn.dataset.id))));
            document.querySelectorAll('.deletePostBtn').forEach(btn => btn.addEventListener('click', () => deletePost(parseInt(btn.dataset.id))));
        }
    }

    async function openPostDetail(postId) {
        currentPostId = postId;
        await incrementViews(postId);
        const post = posts.find(p => p.id === postId);
        const chaptersRes = await fetch(`api_chapters.php?post_id=${postId}`);
        const chapters = await chaptersRes.json();
        document.getElementById('postsView').style.display = 'none';
        document.getElementById('postDetailView').style.display = 'block';
        document.getElementById('postDetailHeader').innerHTML = `
            <div style="display:flex; gap:1.5rem; align-items:center; flex-wrap:wrap; margin-bottom:1rem;">
                <img src="${post.image_url || 'https://placehold.co/120x120'}" style="width:120px; height:120px; object-fit:cover; border-radius:32px; border:2px solid #c0678b;">
                <div>
                    <h2 style="font-family:'Cinzel';">📖 ${escapeHtml(post.title)}</h2>
                    <p>${escapeHtml(post.description) || 'Sem descrição.'}</p>
                    <p><i class="fas fa-eye"></i> ${post.views || 0} visualizações · ${chapters.length} capítulos</p>
                </div>
            </div>
        `;
        renderChapters(chapters);
    }

    function renderChapters(chapters) {
        const container = document.getElementById('chaptersContainer');
        if (!chapters.length) {
            container.innerHTML = '<div class="empty-message">Nenhum capítulo ainda.</div>';
            return;
        }
        let html = '';
        chapters.forEach(ch => {
            const tagsHtml = ch.tags ? `<div class="chapter-tags">${ch.tags.split(',').map(t => `<span class="tag">#${escapeHtml(t.trim())}</span>`).join('')}</div>` : '';
            html += `
                <div class="chapter-card" id="chapter-${ch.id}">
                    <div class="chapter-header">
                        <h3>❖ ${escapeHtml(ch.title)}</h3>
                        <small>${new Date(ch.created_at).toLocaleString()}</small>
                    </div>
                    ${tagsHtml}
                    <div class="chapter-preview">
                        <img class="chapter-img" src="${ch.image_url || 'https://placehold.co/140x140'}" onerror="this.src='https://placehold.co/140x140'">
                        <div class="chapter-summary">${escapeHtml(ch.summary) || 'Sem resumo.'}</div>
                    </div>
                    <button class="btn-expand" data-chid="${ch.id}"><i class="fas fa-chevron-down"></i> Ler mais</button>
                    <div id="fullChapter-${ch.id}" class="chapter-full-content">${sanitizeHtml(ch.content_html)}</div>
                    ${currentUser.is_admin ? `<div class="chapter-actions" style="margin-top:1rem;">
                        <button class="editChapterBtn" data-chid="${ch.id}"><i class="fas fa-pen"></i> Editar</button>
                        <button class="deleteChapterBtn" data-chid="${ch.id}"><i class="fas fa-trash-alt"></i> Excluir</button>
                    </div>` : ''}
                </div>
            `;
        });
        container.innerHTML = html;
        document.querySelectorAll('.btn-expand').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const chid = parseInt(btn.dataset.chid);
                const div = document.getElementById(`fullChapter-${chid}`);
                if (div.style.display === 'none' || !div.style.display) {
                    div.style.display = 'block';
                    btn.innerHTML = '<i class="fas fa-chevron-up"></i> Esconder';
                } else {
                    div.style.display = 'none';
                    btn.innerHTML = '<i class="fas fa-chevron-down"></i> Ler mais';
                }
            });
        });
        if (currentUser.is_admin) {
            document.querySelectorAll('.editChapterBtn').forEach(btn => btn.addEventListener('click', () => openChapterModal(parseInt(btn.dataset.chid))));
            document.querySelectorAll('.deleteChapterBtn').forEach(btn => btn.addEventListener('click', () => deleteChapter(parseInt(btn.dataset.chid))));
        }
        chapters.forEach(ch => document.getElementById(`fullChapter-${ch.id}`).style.display = 'none');
    }

    // ==================== CAPÍTULOS ====================
    async function addChapter(postId, title, tags, image_url, summary, content_html) {
        const res = await fetch('api_chapters.php', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({post_id: postId, title, tags, image_url, summary, content_html})
        });
        if (res.ok) openPostDetail(postId);
        else alert('Erro ao criar capítulo');
    }

    async function updateChapter(chapterId, title, tags, image_url, summary, content_html) {
        const res = await fetch('api_chapters.php', {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id: chapterId, title, tags, image_url, summary, content_html})
        });
        if (res.ok) openPostDetail(currentPostId);
        else alert('Erro ao atualizar capítulo');
    }

    async function deleteChapter(chapterId) {
        if (!confirm('Excluir este capítulo?')) return;
        const res = await fetch('api_chapters.php', {
            method: 'DELETE',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id: chapterId})
        });
        if (res.ok) openPostDetail(currentPostId);
        else alert('Erro ao excluir');
    }

    // ==================== MODAIS ====================
    function openPostModal(postId = null) {
        editingPostId = postId;
        const modal = document.getElementById('postModal');
        const titleEl = document.getElementById('postModalTitle');
        if (postId) {
            const post = posts.find(p => p.id === postId);
            if (!post) return;
            titleEl.innerText = '✎ Editar Postagem';
            document.getElementById('postTitle').value = post.title;
            document.getElementById('postImageUrl').value = post.image_url || '';
            document.getElementById('postDesc').value = post.description || '';
        } else {
            titleEl.innerText = '✧ Nova Postagem ✧';
            document.getElementById('postTitle').value = '';
            document.getElementById('postImageUrl').value = '';
            document.getElementById('postDesc').value = '';
        }
        modal.classList.add('active');
    }

    function openChapterModal(chapterId = null) {
        editingChapterId = chapterId;
        const modal = document.getElementById('chapterModal');
        const titleEl = document.getElementById('chapterModalTitle');
        if (chapterId) {
            fetch(`api_chapters.php?post_id=${currentPostId}`).then(res => res.json()).then(chapters => {
                const chap = chapters.find(c => c.id === chapterId);
                if (chap) {
                    titleEl.innerText = '✎ Editar Capítulo';
                    document.getElementById('chapterTitle').value = chap.title;
                    document.getElementById('chapterTags').value = chap.tags || '';
                    document.getElementById('chapterImageUrl').value = chap.image_url || '';
                    document.getElementById('chapterSummary').value = chap.summary || '';
                    document.getElementById('chapterContent').value = chap.content_html || '';
                }
            });
        } else {
            titleEl.innerText = '✧ Novo Capítulo ✧';
            document.getElementById('chapterTitle').value = '';
            document.getElementById('chapterTags').value = '';
            document.getElementById('chapterImageUrl').value = '';
            document.getElementById('chapterSummary').value = '';
            document.getElementById('chapterContent').value = '';
        }
        modal.classList.add('active');
    }

    document.getElementById('savePostBtn')?.addEventListener('click', () => {
        const title = document.getElementById('postTitle').value;
        const image_url = document.getElementById('postImageUrl').value;
        const description = document.getElementById('postDesc').value;
        if (!title.trim()) { alert('Título obrigatório'); return; }
        if (editingPostId) updatePost(editingPostId, title, image_url, description);
        else createPost(title, image_url, description);
        document.getElementById('postModal').classList.remove('active');
    });

    document.getElementById('saveChapterBtn')?.addEventListener('click', () => {
        const title = document.getElementById('chapterTitle').value;
        const tags = document.getElementById('chapterTags').value;
        const image_url = document.getElementById('chapterImageUrl').value;
        const summary = document.getElementById('chapterSummary').value;
        let content = document.getElementById('chapterContent').value;
        if (!title.trim()) { alert('Título do capítulo obrigatório'); return; }
        // converter markdown simples
        content = content.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\*(.*?)\*/g, '<i>$1</i>').replace(/~~(.*?)~~/g, '<u>$1</u>');
        if (editingChapterId) updateChapter(editingChapterId, title, tags, image_url, summary, content);
        else addChapter(currentPostId, title, tags, image_url, summary, content);
        document.getElementById('chapterModal').classList.remove('active');
    });

    // Voltar
    document.getElementById('backToPostsBtn')?.addEventListener('click', () => {
        currentPostId = null;
        document.getElementById('postDetailView').style.display = 'none';
        document.getElementById('postsView').style.display = 'block';
        loadPosts();
    });
    document.getElementById('newPostBtn')?.addEventListener('click', () => openPostModal());
    document.getElementById('addChapterBtn')?.addEventListener('click', () => { if (currentPostId) openChapterModal(); });
    document.getElementById('editPostBtn')?.addEventListener('click', () => { if (currentPostId) openPostModal(currentPostId); });
    document.getElementById('deletePostBtn')?.addEventListener('click', () => { if (currentPostId) deletePost(currentPostId); });
    document.getElementById('exportAllBtn')?.addEventListener('click', () => {
        const dataStr = JSON.stringify(posts, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `forum_backup_${Date.now()}.json`;
        a.click(); URL.revokeObjectURL(a.href);
    });
    document.getElementById('importAllBtn')?.addEventListener('click', () => document.getElementById('importInput').click());
    document.getElementById('importInput')?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
            try {
                const imported = JSON.parse(ev.target.result);
                if (Array.isArray(imported)) {
                    // Importação simples: substitui os dados locais (apenas admin)
                    for (const post of imported) {
                        await createPost(post.title, post.image_url, post.description);
                    }
                    alert('Importação concluída (apenas postagens, sem capítulos por simplicidade)');
                    loadPosts();
                } else alert('Arquivo inválido');
            } catch(err) { alert('Erro ao importar'); }
        };
        reader.readAsText(file);
        e.target.value = '';
    });

    function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])) || ''; }
    function sanitizeHtml(html) { return html; }

    // Iniciar
    checkAuth();
</script>
</body>
</html>
